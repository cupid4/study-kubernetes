# Ingress(인그레스) 란?
# 쿠버네티스에서 Ingress(인그레스) 는 "외부 트래픽을 클러스터 내부의 서비스로 라우팅하는" 오브젝트입니다.
# - HTTP/HTTPS 라우팅 규칙을 정의하여 도메인 이름이나 경로 기반으로 트래픽을 분배합니다.
# - Ingress Controller(예: nginx-ingress) 와 함께 사용됩니다.
# - 하나의 외부 IP 로 여러 서비스에 접근할 수 있도록 합니다.
# - 주로 LoadBalancer Service 보다 효율적인 외부 노출 방식입니다.


apiVersion: networking.k8s.io/v1                        # ② 버전을 지정합니다 (Ingress 를 쓰기 위한 기본 규격입니다).
kind: Ingress                                           # ③ 생성할 오브젝트 종류를 'Ingress'로 지정합니다.
metadata:                                               # ④ 이 오브젝트의 이름표 (메타데이터) 를 달아주는 기본 정보 칸입니다.
  name: django-ingress                                  # ⑤ 이 Ingress 의 이름을 'django-ingress'로 정합니다.
  annotations:                                          # ⑥ [주석] Ingress 의 동작을 추가적으로 설정합니다.
    nginx.ingress.kubernetes.io/rewrite-target: /$2     # ⑦ URL 경로를 재작성하는 규칙을 설정합니다. $2 는 두 번째 캡처 그룹을 의미합니다.
spec:                                                   # ⑧ [상세 설계] 이 Ingress 의 동작 방식을 설정합니다.
  ingressClassName: nginx                               # ⑨ [인그레스 클래스] 'nginx' 인그레스 컨트롤러를 사용합니다.
  rules:                                                # ⑩ [라우팅 규칙] 외부 트래픽 라우팅 규칙을 정의합니다.
  - http:                                               # ⑪ [HTTP 규칙] HTTP 프로토콜 기반 라우팅을 설정합니다.
      paths:                                            # ⑫ [경로 목록] 경로 기반 라우팅 규칙을 시작합니다.
      - path: /test01(/|$)(.*)                          # ⑬ 경로 '/test01'로 접근하는 트래픽을 처리합니다. 정규식 패턴을 사용합니다.
        pathType: Prefix                                # ⑭ 경로 타입을 'Prefix'로 설정합니다.
        backend:                                        # ⑮ [백엔드] 트래픽을 전달할 서비스를 지정합니다.
          service:                                      # ⑯ [서비스] 백엔드 서비스 정보를 설정합니다.
            name: django-service                        # ⑰ 서비스 이름을 'django-service'로 설정합니다.
            port:                                       # ⑱ [포트] 서비스의 포트 정보를 설정합니다.
              number: 80                                # ⑲ 포트 번호를 80 으로 설정합니다.
