# CronJob(크론잡) 이란?
# 쿠버네티스에서 CronJob(크론잡) 은 "정해진 시간에 Job 을 자동으로 실행하는" 오브젝트입니다.
# 리눅스의 cron 과 동일한 개념으로, 스케줄링된 작업을 쿠버네티스에서 관리할 때 사용됩니다.
# - schedule 필드에 cron 형식의 시간 설정을 작성합니다. (예: "*/1 * * * *" → 매분 실행)
# - 매분, 매시간, 매일, 매월, 매주 등 다양한 주기 설정이 가능합니다.
# - 주로 백업, 정기 보고서 생성, 데이터 정리, 모니터링 등 주기적인 작업에 사용됩니다.
# - Job 을 생성하므로, Job 과 마찬가지로 '완료 (Completion)'에 중점을 둡니다.


apiVersion: batch/v1                   # ② 버전을 지정합니다 (CronJob 을 쓰기 위한 기본 규격입니다).
kind: CronJob                          # ③ 생성할 오브젝트 종류를 'CronJob'으로 지정합니다.
metadata:                              # ④ 이 오브젝트의 이름표 (메타데이터) 를 달아주는 기본 정보 칸입니다.
  name: cronjob-test02                 # ⑤ 이 CronJob 의 이름을 'cronjob-test02'로 정합니다.
spec:                                  # ⑥ [상세 설계] 이 CronJob 의 동작 방식을 설정합니다.
  schedule: "*/1 * * * *"              # ⑦ [실행 스케줄] cron 형식으로 실행 시간을 지정합니다. "*/1 * * * *"는 매분 실행을 의미합니다.
  jobTemplate:                         # ⑧ [Job 템플릿] CronJob 이 생성할 Job 의 설계도를 시작합니다.
    spec:                              # ⑨ [Job 스펙] Job 의 상세 설정을 시작합니다.
      template:                        # ⑩ [파드 템플릿] Job 이 생성할 파드의 설계도를 시작합니다.
        spec:                          # ⑪ [파드 내부 설계] 파드 내부에 어떤 컨테이너를 실행할지 설정합니다.
          containers:                  # ⑫ 컨테이너 목록을 시작합니다.
          - name: nginx-test02         # ⑬ 컨테이너 이름을 'nginx-test02'로 정합니다.
            image: nginx:1.25          # ⑭ 컨테이너 이미지로 'nginx:1.25' 버전을 사용합니다.
            command:                   # ⑮ 컨테이너가 실행할 명령어를 지정합니다.
            - /bin/sh                  # ⑯ 쉘 인터프리터를 실행합니다.
            - -c                       # ⑭ 다음 인자를 명령어로 실행하라는 옵션입니다.
            - echo Hello Kubernetes!   # ⑱ 출력할 메시지를 지정합니다.
          restartPolicy: Never         # ⑲ [재시작 정책] 'Never'로 설정하여, 파드가 실패해도 재시작하지 않습니다.

