# Job(잡) 이란?
# 쿠버네티스에서 Job(잡) 은 "하나 이상의 파드를 생성하고, 지정된 작업이 성공적으로 완료될 때까지 관리하는" 오브젝트입니다.
# 일반적인 Deployment 와의 차이점은 '완료 (Completion)'에 중점을 둔다는 점입니다.
# - 한 번 실행되고 끝나는 작업 (Batch 작업) 에 적합합니다.
# - 파드가 성공적으로 종료 (exit code 0) 될 때까지 재시작을 시도합니다.
# - 주로 백업, 데이터 처리, 일회성 스크립트 실행 등에 사용됩니다.
# - restartPolicy 는 'Never' 또는 'OnFailure'만 사용 가능합니다.


apiVersion: batch/v1                              # ② 버전을 지정합니다 (Job 을 쓰기 위한 기본 규격입니다).
kind: Job                                         # ③ 생성할 오브젝트 종류를 'Job'으로 지정합니다.
metadata:                                         # ④ 이 오브젝트의 이름표 (메타데이터) 를 달아주는 기본 정보 칸입니다.
  name: job-test01                                # ⑤ 이 Job 의 이름을 'job-test01'로 정합니다.
spec:                                             # ⑥ [상세 설계] 이 Job 의 동작 방식을 설정합니다.
  template:                                       # ⑦ [파드 템플릿] Job 이 생성할 파드의 설계도를 시작합니다.
    spec:                                         # ⑧ [파드 내부 설계] 파드 내부에 어떤 컨테이너를 실행할지 설정합니다.
      containers:                                 # ⑨ 컨테이너 목록을 시작합니다.
      - name: nginx-test01                        # ⑩ 컨테이너 이름을 'nginx-test01'로 정합니다.
        image: nginx:1.25                         # ⑪ 컨테이너 이미지로 'nginx:1.25' 버전을 사용합니다.
        command: ["echo", "Hello, Kubernetes!"]   # ⑫ 컨테이너가 실행할 명령어를 지정합니다. 여기서 echo 명령어로 메시지를 출력합니다.
      restartPolicy: Never                        # ⑬ [재시작 정책] 'Never'로 설정하여, 파드가 실패해도 재시작하지 않습니다. (Job 은 기본적으로 성공 여부를 확인합니다.)
  backoffLimit: 3                                 # ⑭ [실패 재시도 횟수] Job 이 실패했을 때 최대 3 번까지 재시도합니다.

