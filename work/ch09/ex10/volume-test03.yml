# PersistentVolume(PV) 실습을 위해 yml 파일을 생성합니다.
# 쿠버네티스에서 Pod 가 사용할 저장소를 정의합니다.
# 이 Pod 는 PVC 와 바인딩된 볼륨을 사용합니다.
#
# 1. vim 을 활용해 yml 파일을 생성합니다.
# 2. apiVersion 을 입력합니다.
# 3. 종류는 Pod 로 설정합니다.
# 4. 다음으로는 메타 데이터를 입력합니다.
# 5. 적절한 파드 이름을 생성합니다.
# 6. spec 을 통해 파드 내부의 상태를 정해야 하는데, 파드 내부에는 컨테이너와 볼륨을 생성할 예정입니다.
# 7. nodeSelector 를 통해 파드가 실행될 노드를 정합니다.
# 8. 이번 실습에서 생성할 파드는 myserver02 에 생성되도록 설정합니다.
# 9. 컨테이너를 생성합니다.
# 10. 컨테이너 이름을 정합니다.
# 11. 컨테이너 생성에 사용할 이미지를 설정합니다.
# 12. 컨테이너가 사용할 볼륨을 마운트합니다.
# 13. 컨테이너가 사용하게 될 볼륨 이름을 작성합니다. 이때 사용하는 볼륨 이름은 이후 생성할 볼륨 이름과 일치해야 합니다.
# 14. 볼륨을 마운트할 경로를 작성합니다. 이렇게 하면 컨테이너 설정이 완료됩니다.
# 15. 추가로 파드 내부에 생성할 볼륨을 생성합니다.
# 16. 볼륨 이름을 정합니다.
# 17. 볼륨 타입을 설정하는데, 이번 실습에서는 hostPath 로 설정해주면 됩니다.
# 18. hostPath 의 경로를 설정합니다.
# 19. type 을 DirectoryOrCreate 로 설정하여 디렉터리가 없으면 자동으로 생성되도록 합니다.
#
apiVersion: v1                           # 2. Kubernetes API 버전
kind: Pod                                # 3. 리소스 타입: 파드
metadata:
  name: nginx-volume-03                  # 5. 파드 이름
spec:
  nodeSelector:                          # 7. 노드 선택자
    kubernetes.io/hostname: myserver02   # 8. 실행될 노드 이름
  containers:                            # 9. 컨테이너 정의
  - name: nginx-test01                   # 10. 컨테이너 이름
    image: nginx:latest                  # 11. 컨테이너 이미지
    volumeMounts:                        # 12. 볼륨 마운트
    - name: hostpath-test01              # 13. 볼륨 이름
      mountPath: /mount01                # 14. 마운트 경로
  volumes:                               # 15. 볼륨 정의
  - name: hostpath-test01                # 16. 볼륨 이름
    hostPath:                            # 17. 볼륨 타입: 호스트 경로
      path: /home/eevee/work/volhost01   # 18. 호스트 경로
      type: DirectoryOrCreate            # 19. 디렉터리가 없으면 자동 생성
