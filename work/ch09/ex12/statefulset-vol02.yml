apiVersion: apps/v1                      # ① 버전을 지정합니다 (이번에는 볼륨을 사용하는 내용까지 추가합니다).
kind: StatefulSet                        # ② 생성할 오브젝트 종류를 '스테이트풀셋'으로 지정합니다.
metadata:                                # ③ 기본 정보(이름 등)를 적는 칸입니다.
  name: sfs-test01                       # ③ 메타 데이터 항목을 통해 스테이트풀셋 이름을 정합니다.
spec:                                    # ④ [상세 설계] 스테이트풀셋의 상세 설정을 시작합니다.
  replicas: 1                            # ④ 이번 스테이트풀셋으로 생성할 파드는 한 개로 설정합니다.
  selector:                              # ⑤ [관리 집게] 스테이트풀셋이 어떤 앱 명찰을 보고 관리할지 정합니다.
    matchLabels:      
      app.kubernetes.io/name: web-sfs01       
  serviceName: sfs-service01             # ⑥ 스테이트풀셋이 사용할 헤드리스 서비스를 설정합니다.
  template:                              # ⑦ [붕어빵 틀] 파드들을 찍어내기 위한 설계도를 시작합니다.
    metadata:                            # ⑦ 앞서 selector.matchLabels와 동일하게 파드 명찰을 지정합니다.
      labels:     
        app.kubernetes.io/name: web-sfs01   
    spec:                                # ⑧ [파드 내부 설계] 컨테이너 정보를 입력하기 시작합니다.
      containers:                        # ⑧ 파드 안에서 실행할 프로그램 정보입니다.
      - name: nginx                      # ⑧ 프로그램(컨테이너)의 이름을 'nginx'로 정합니다.
        image: nginx:latest              # ⑧ 최신 버전의 nginx 이미지를 사용하겠다고 정합니다.
        volumeMounts:                    # ⑨ 컨테이너 내부와 연결(마운트)할 볼륨 정보를 입력합니다.
        - name: sfs-vol01                # ⑨ 이 이름은 아래 volumeClaimTemplates에서 정한 이름과 반드시 동일해야 합니다.
          mountPath: /mount01            # ⑨ 컨테이너 내부에 생겨날 볼륨 연결 경로(/mount01)를 지정합니다.
  volumeClaimTemplates:                  # ⑩ 자동으로 PVC(저장소 요청서)를 만들어내는 틀입니다. 따로 PVC 파일을 만들 필요가 없습니다.
  - metadata:                            # ⑪ ⑫ 저장소 요청서의 메타 데이터를 정의합니다.
      name: sfs-vol01                    # ⑪ ⑫ 저장소 요청서(볼륨)의 이름을 'sfs-vol01'로 정합니다.
    spec:                                # ⑬ 볼륨에 대한 구체적인 내부 속성 정보를 입력합니다.
      accessModes: [ "ReadWriteOnce" ]    # ⑭ 읽기/쓰기 모드를 한 번에 하나의 노드만 연결 가능한 'ReadWriteOnce'로 설정합니다.
      storageClassName: pv-sfs-test01    # ⑮ 연결할 저장소 클래스 이름을 지정합니다. (원본 PV 파일의 storageClassName과 일치해야 합니다.)
      resources:                         # ⑯ 이 볼륨이 요청할 하드웨어 리소스 정보를 입력합니다.
        requests:                        # ⑰ ⑱ 볼륨 용량에 대한 구체적인 요청 사항을 입력합니다.
          storage: 20Mi                  # ⑰ ⑱ 요청 사항으로 20메가바이트(20Mi)만큼의 용량을 요청합니다.