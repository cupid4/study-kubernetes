apiVersion: apps/v1                      # ② 디플로이먼트를 생성할 것이므로 apiVersion을 apps/v1이라고 입력합니다.
kind: Deployment                         # ③ 생성하게 될 오브젝트 종류를 지정합니다. 이번 실습에서는 디플로이먼트를 생성할 것이므로 Deployment라고 입력합니다.
metadata:                                # ④ 메타 정보를 입력합니다.
  name: ingress-deploy-test01            # ⑤ 생성할 디플로이먼트 이름을 짓습니다.
spec:                                    # ⑥ spec을 활용해 생성할 디플로이먼트의 상태를 정합니다.
  replicas: 3                            # ⑦ 생성할 레플리카셋은 세 개로 합니다.
  selector:                              # ⑧ selector를 활용하면 디플로이먼트가 관리할 파드를 연결할 수 있습니다. selector는 파드에 라벨을 붙이는 옵션이라고 생각하면 됩니다.
    matchLabels:                         # ⑨⑩ matchLabels의 app.kubernetes.io/name으로 지정하는 이름은 selector로 적용하는 이름이 되므로 이는 파드를 생성했을 때의 이름과 동일해야 합니다.
      app.kubernetes.io/name: web-deploy01  
  template:                              # ⑪ template은 생성할 파드의 정보를 표현할 때 사용합니다.
    metadata:                            # ⑫⑬⑭ 파드의 메타 정보를 입력합니다.
      labels: 
         app.kubernetes.io/name: web-deploy01 
    spec:                                # ⑮ 파드의 spec을 입력합니다.
      containers:                        # ⑯⑰⑱ 생성할 컨테이너의 이름과 컨테이너 생성에 사용할 이미지 정보를 입력합니다.
      - name: nginx 
        image: nginx:1.25